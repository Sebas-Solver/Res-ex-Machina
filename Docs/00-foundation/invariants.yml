# =============================================================================
# SYSTEM INVARIANTS — Res ex Machina
# =============================================================================
# These are ABSOLUTE rules that can never be broken.
# They don't define features. They define limits the system cannot cross.
#
# Usage:
#   - Automated tests
#   - Code validations
#   - PR reviews
#   - Reasoning by AI agents working on the codebase
#
# Version: 1.0
# Date: 2026-02-10
# =============================================================================

invariants:

  # ---------------------------------------------------------------------------
  # IMMUTABILITY
  # ---------------------------------------------------------------------------
  
  - id: INV-001
    name: records_are_permanent
    rule: "A record, once created, can NEVER be deleted"
    enforcement: database_constraint + api_validation
    test: "DELETE /v1/records/{id} → 405 Method Not Allowed"

  - id: INV-002
    name: hash_is_immutable
    rule: "The content_hash of a record can NEVER be modified after creation"
    enforcement: database_constraint (no UPDATE on content_hash)
    test: "UPDATE records SET content_hash = 'x' → constraint violation"

  - id: INV-003
    name: pog_is_immutable
    rule: "The pog_bundle of a record can NEVER be modified after creation"
    enforcement: database_constraint (no UPDATE on pog_bundle)
    test: "UPDATE records SET pog_bundle = '{}' → constraint violation"

  - id: INV-004
    name: timestamp_is_immutable
    rule: "The created_at of a record can NEVER be modified"
    enforcement: database_constraint
    test: "UPDATE records SET created_at = NOW() → constraint violation"

  # ---------------------------------------------------------------------------
  # NEUTRALITY
  # ---------------------------------------------------------------------------

  - id: INV-005
    name: no_human_validation
    rule: "No human action can mark a record as 'valid' or 'invalid'"
    enforcement: api_design (no approve/reject endpoint exists)
    test: "No route POST /v1/records/{id}/approve or /reject exists"

  - id: INV-006
    name: no_authorship_assignment
    rule: "The platform NEVER assigns authorship, ownership or property rights to any record"
    enforcement: schema_design + api_design
    test: "Record schema does not contain fields 'author', 'owner', 'copyright'"

  - id: INV-007
    name: no_quality_judgment
    rule: "The platform NEVER evaluates, scores or rates the quality of a registered output"
    enforcement: api_design
    test: "No field 'score', 'quality', 'originality' exists in Record schema"

  - id: INV-008
    name: no_content_modification
    rule: "The platform NEVER edits, enhances or modifies registered content"
    enforcement: architecture (the API does not process content, only hashes)
    test: "No endpoint that accepts content for modification exists"

  # ---------------------------------------------------------------------------
  # IDENTITY AND SIGNATURES
  # ---------------------------------------------------------------------------

  - id: INV-009
    name: pog_must_be_signed
    rule: "A PoG bundle MUST ALWAYS be signed by the identity of the declared agent"
    enforcement: api_validation (verify signature before saving)
    test: "POST with invalid signature → 401; recovered signer ≠ agent_wallet → 401"

  - id: INV-010
    name: no_key_custody
    rule: "The platform NEVER stores, manages or has access to agent private keys"
    enforcement: architecture (only signatures are received, never keys)
    test: "No table or field storing private_key exists"

  - id: INV-011
    name: identity_is_technical
    rule: "The agent identity (wallet) is technical, legal personality is NEVER inferred"
    enforcement: documentation + api_design
    test: "API responses do not contain fields 'legal_entity', 'person', 'company'"

  # ---------------------------------------------------------------------------
  # ECONOMIC
  # ---------------------------------------------------------------------------

  - id: INV-012
    name: fee_always_required
    rule: "No record can exist without a fee having been paid"
    enforcement: api_validation (verify fee before creating record)
    test: "POST without verifiable fee → 402 Payment Required"

  # ---------------------------------------------------------------------------
  # CONSISTENCY
  # ---------------------------------------------------------------------------

  - id: INV-013
    name: idempotency
    rule: "The same content_hash from the same wallet produces the same record_id (idempotency)"
    enforcement: database_constraint (UNIQUE on content_hash)
    test: "Duplicate POST → 409 Conflict with existing record_id"

  - id: INV-014
    name: nonce_uniqueness
    rule: "A nonce cannot be reused by the same wallet"
    enforcement: database_constraint + api_validation
    test: "POST with nonce already used by that wallet → 409 Conflict"

  # ---------------------------------------------------------------------------
  # ANCHORING
  # ---------------------------------------------------------------------------

  - id: INV-015
    name: anchor_is_additive
    rule: "Anchoring only ADDS information (tx_hash, block, chain_id); it never modifies the original record"
    enforcement: api_design (anchoring is a partial UPDATE, only anchor_* fields)
    test: "Anchoring only modifies anchor_tx_hash, anchor_block, anchor_chain_id, anchored_at, state"

  - id: INV-016
    name: receipt_before_anchor
    rule: "The agent ALWAYS receives an immediate receipt, even if anchoring is pending"
    enforcement: api_design (201 with state: pending_anchor)
    test: "Successful POST → 201 with receipt_hash, without waiting for anchor"

  # ---------------------------------------------------------------------------
  # TRANSPARENCY
  # ---------------------------------------------------------------------------

  - id: INV-017
    name: records_are_publicly_verifiable
    rule: "Anyone can verify the existence and state of a record without authentication"
    enforcement: api_design (GET endpoints without auth)
    test: "GET /v1/records/{id} and GET /v1/records/verify without auth → 200"

  - id: INV-018
    name: rules_are_public
    rule: "All system rules are public and documented"
    enforcement: documentation (this file)
    test: "invariants.yml is in the public repository"

  # ---------------------------------------------------------------------------
  # RESILIENCE
  # ---------------------------------------------------------------------------

  - id: INV-019
    name: anchor_failed_does_not_invalidate
    rule: "A record with state 'anchor_failed' is still a valid fact. The PoG, timestamp and receipt are immutable"
    enforcement: api_design + documentation
    test: "GET record with state=anchor_failed → returns all fields normally"

  - id: INV-020
    name: fee_must_be_onchain
    rule: "The fee is verified against a real on-chain transaction (fee_tx_hash). Non-verifiable payments are not accepted"
    enforcement: api_validation (verify fee_tx_hash before creating record)
    test: "POST with non-existent or unconfirmed fee_tx_hash → 402"

  # ---------------------------------------------------------------------------
  # PROFILING AND PRIVACY
  # ---------------------------------------------------------------------------

  - id: INV-021
    name: no_public_wallet_listing
    rule: "No public listing of records by wallet exists in v1. Verification is individual (by hash or record_id)"
    enforcement: api_design (no wallet listing endpoint exists)
    test: "No route GET /v1/records?wallet= or GET /v1/agents/{wallet}/records exists"

  - id: INV-022
    name: no_scoring_no_rankings
    rule: "The platform NEVER generates scoring, rankings or reliability labels for agents or records"
    enforcement: api_design + schema_design
    test: "No field 'score', 'rank', 'reliability', 'trust_level' exists in any schema"

  - id: INV-023
    name: no_automatic_conclusions
    rule: "The platform NEVER issues automatic conclusions about registered data"
    enforcement: documentation + api_design
    test: "No endpoint returns interpretive fields (only factual data)"

  - id: INV-024
    name: profiling_data_without_judgment
    rule: "Any future profiling service exposes aggregated data, NEVER judgments. The system provides data, interpretation is the responsibility of the authorized user"
    enforcement: documentation + architecture
    test: "Documentation of future profiling endpoints does not contain interpretive fields"
