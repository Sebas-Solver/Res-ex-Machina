# =============================================================================
# INVARIANTES DEL SISTEMA — Res ex Machina
# =============================================================================
# Estas son reglas ABSOLUTAS que nunca pueden romperse.
# No definen features. Definen límites que el sistema no puede cruzar.
#
# Uso:
#   - Tests automatizados
#   - Validaciones en código
#   - Revisiones de PR
#   - Reasoning de agentes IA que trabajen en el código
#
# Versión: 1.0
# Fecha: 2026-02-10
# =============================================================================

invariants:

  # ---------------------------------------------------------------------------
  # INMUTABILIDAD
  # ---------------------------------------------------------------------------
  
  - id: INV-001
    name: records_are_permanent
    rule: "Un record, una vez creado, NUNCA puede ser eliminado"
    enforcement: database_constraint + api_validation
    test: "DELETE /v1/records/{id} → 405 Method Not Allowed"

  - id: INV-002
    name: hash_is_immutable
    rule: "El content_hash de un record NUNCA puede ser modificado después de la creación"
    enforcement: database_constraint (no UPDATE on content_hash)
    test: "UPDATE records SET content_hash = 'x' → constraint violation"

  - id: INV-003
    name: pog_is_immutable
    rule: "El pog_bundle de un record NUNCA puede ser modificado después de la creación"
    enforcement: database_constraint (no UPDATE on pog_bundle)
    test: "UPDATE records SET pog_bundle = '{}' → constraint violation"

  - id: INV-004
    name: timestamp_is_immutable
    rule: "El created_at de un record NUNCA puede ser modificado"
    enforcement: database_constraint
    test: "UPDATE records SET created_at = NOW() → constraint violation"

  # ---------------------------------------------------------------------------
  # NEUTRALIDAD
  # ---------------------------------------------------------------------------

  - id: INV-005
    name: no_human_validation
    rule: "Ninguna acción humana puede marcar un record como 'válido' o 'inválido'"
    enforcement: api_design (no existe endpoint de approve/reject)
    test: "No existe ruta POST /v1/records/{id}/approve ni /reject"

  - id: INV-006
    name: no_authorship_assignment
    rule: "La plataforma NUNCA asigna autoría, titularidad ni propiedad a ningún record"
    enforcement: schema_design + api_design
    test: "Record schema no contiene campos 'author', 'owner', 'copyright'"

  - id: INV-007
    name: no_quality_judgment
    rule: "La plataforma NUNCA evalúa, puntúa ni califica la calidad de un output registrado"
    enforcement: api_design
    test: "No existe campo 'score', 'quality', 'originality' en Record schema"

  - id: INV-008
    name: no_content_modification
    rule: "La plataforma NUNCA edita, mejora ni modifica el contenido registrado"
    enforcement: architecture (la API no procesa contenido, solo hashes)
    test: "No existe endpoint que acepte contenido para modificación"

  # ---------------------------------------------------------------------------
  # IDENTIDAD Y FIRMAS
  # ---------------------------------------------------------------------------

  - id: INV-009
    name: pog_must_be_signed
    rule: "Un PoG bundle SIEMPRE debe estar firmado por la identidad del agente declarado"
    enforcement: api_validation (verificar firma antes de guardar)
    test: "POST con firma inválida → 401; recovered signer ≠ agent_wallet → 401"

  - id: INV-010
    name: no_key_custody
    rule: "La plataforma NUNCA almacena, gestiona ni tiene acceso a claves privadas de agentes"
    enforcement: architecture (solo se reciben firmas, nunca claves)
    test: "No existe tabla ni campo que almacene private_key"

  - id: INV-011
    name: identity_is_technical
    rule: "La identidad del agente (wallet) es técnica, NUNCA se infiere personalidad jurídica"
    enforcement: documentation + api_design
    test: "API responses no contienen campos 'legal_entity', 'person', 'company'"

  # ---------------------------------------------------------------------------
  # ECONÓMICOS
  # ---------------------------------------------------------------------------

  - id: INV-012
    name: fee_always_required
    rule: "Ningún record puede existir sin que se haya pagado un fee"
    enforcement: api_validation (verificar fee antes de crear record)
    test: "POST sin fee verificable → 402 Payment Required"

  # ---------------------------------------------------------------------------
  # CONSISTENCIA
  # ---------------------------------------------------------------------------

  - id: INV-013
    name: idempotency
    rule: "El mismo content_hash desde la misma wallet produce el mismo record_id (idempotencia)"
    enforcement: database_constraint (UNIQUE on content_hash)
    test: "POST duplicado → 409 Conflict con record_id existente"

  - id: INV-014
    name: nonce_uniqueness
    rule: "Un nonce no puede reutilizarse por la misma wallet"
    enforcement: database_constraint + api_validation
    test: "POST con nonce ya usado por esa wallet → 409 Conflict"

  # ---------------------------------------------------------------------------
  # ANCHORING
  # ---------------------------------------------------------------------------

  - id: INV-015
    name: anchor_is_additive
    rule: "El anchoring solo AÑADE información (tx_hash, block, chain_id); nunca modifica el record original"
    enforcement: api_design (anchoring es un UPDATE parcial, solo campos anchor_*)
    test: "Anchoring solo modifica anchor_tx_hash, anchor_block, anchor_chain_id, anchored_at, state"

  - id: INV-016
    name: receipt_before_anchor
    rule: "El agente SIEMPRE recibe un receipt inmediato, aunque el anchoring esté pendiente"
    enforcement: api_design (201 con state: pending_anchor)
    test: "POST exitoso → 201 con receipt_hash, sin esperar anchor"

  # ---------------------------------------------------------------------------
  # TRANSPARENCIA
  # ---------------------------------------------------------------------------

  - id: INV-017
    name: records_are_publicly_verifiable
    rule: "Cualquier persona puede verificar la existencia y el estado de un record sin autenticación"
    enforcement: api_design (GET endpoints sin auth)
    test: "GET /v1/records/{id} y GET /v1/records/verify sin auth → 200"

  - id: INV-018
    name: rules_are_public
    rule: "Todas las reglas del sistema son públicas y documentadas"
    enforcement: documentation (este archivo)
    test: "invariants.yml está en el repositorio público"
