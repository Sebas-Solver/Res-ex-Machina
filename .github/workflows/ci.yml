# ============================================
# Res ex Machina — CI Pipeline
# ============================================
# Runs on every push and PR to main:
# 1. npm audit (security dependencies)
# 2. TypeScript compile check
# 3. ESLint (code quality + style)
# 4. Unit + integration tests (vitest)
# 5. Coverage report (v8)
# 6. Production build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs of the same branch/PR
# to avoid wasting CI minutes unnecessarily
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [20, 22]

    # Environment variables defined once,
    # inherited by all steps in the job.
    # ⚠️ Sensitive keys stored in GitHub Secrets (Settings → Secrets → Actions).
    # Never hardcode keys in public YAML, even for development.
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      L2_RPC_URL: http://localhost:8545
      L2_CHAIN_ID: 31337
      FEE_RECEIVER_ADDRESS: ${{ secrets.FEE_RECEIVER_ADDRESS }}
      FEE_MINIMUM_AMOUNT: 0.01
      ANCHOR_WALLET_PRIVATE_KEY: ${{ secrets.ANCHOR_WALLET_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (security)
        run: npm audit --audit-level=high

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Production build
        run: npm run build

      # Audit M-04: Include MCP Server in CI pipeline
      - name: MCP Server - Install & Type Check
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          cd packages/mcp-server
          npm ci
          npx tsc --noEmit
