# ============================================
# Res ex Machina — CI Pipeline
# ============================================
# Ejecuta en cada push y PR a main:
# 1. npm audit (dependencias de seguridad)
# 2. TypeScript compile check
# 3. ESLint (code quality + style)
# 4. Tests unitarios + integración (vitest)
# 5. Coverage report (v8)
# 6. Build de producción

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores de la misma branch/PR
# para no gastar minutos de CI innecesariamente
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [20, 22]

    # Variables de entorno definidas una sola vez,
    # heredadas por todos los steps del job
    # Variables de entorno para CI.
    # ⚠️ Claves sensibles en GitHub Secrets (Settings → Secrets → Actions).
    # Incluso para desarrollo, nunca hardcodear claves en YAML público.
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      L2_RPC_URL: http://localhost:8545
      L2_CHAIN_ID: 31337
      FEE_RECEIVER_ADDRESS: ${{ secrets.FEE_RECEIVER_ADDRESS }}
      FEE_MINIMUM_AMOUNT: 0.01
      ANCHOR_WALLET_PRIVATE_KEY: ${{ secrets.ANCHOR_WALLET_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Auditar dependencias (seguridad)
        run: npm audit --audit-level=high

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npm run lint

      - name: Ejecutar tests
        run: npm test

      - name: Ejecutar tests con cobertura
        run: npm run test:coverage

      - name: Subir reporte de cobertura
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build producción
        run: npm run build
