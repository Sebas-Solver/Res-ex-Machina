# ============================================
# Res ex Machina — CI Pipeline
# ============================================
# Two jobs:
#   1. test (REQUIRED) — All checks that must pass for merge:
#      npm audit, TypeScript, ESLint, Vitest, Coverage,
#      Production build, MCP Server install + Jest tests
#   2. mcp-typecheck (NON-BLOCKING) — MCP Server tsc --noEmit
#      Currently OOM due to viem type graph complexity.
#      Tracked in Issue #43. P1 technical debt.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs of the same branch/PR
# to avoid wasting CI minutes unnecessarily
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: REQUIRED — Must pass for merge
  # ─────────────────────────────────────────────
  test:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    # Environment variables defined once,
    # inherited by all steps in the job.
    # ⚠️ Sensitive keys stored in GitHub Secrets (Settings → Secrets → Actions).
    # Never hardcode keys in public YAML, even for development.
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      L2_RPC_URL: http://localhost:8545
      L2_CHAIN_ID: 31337
      FEE_RECEIVER_ADDRESS: ${{ secrets.FEE_RECEIVER_ADDRESS }}
      FEE_MINIMUM_AMOUNT: 0.01
      ANCHOR_WALLET_PRIVATE_KEY: ${{ secrets.ANCHOR_WALLET_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (security)
        run: npm audit --audit-level=high

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Production build
        run: npm run build

      # Audit M-04: MCP Server tests MUST pass in CI (not just locally)
      - name: MCP Server - Install
        run: |
          cd packages/mcp-server
          npm ci

      - name: MCP Server - Tests (Jest)
        run: |
          cd packages/mcp-server
          npm test

  # ─────────────────────────────────────────────
  # Job 2: NON-BLOCKING — MCP Server typecheck
  # Known OOM — tracked in Issue #43 (P1 debt)
  # ─────────────────────────────────────────────
  mcp-typecheck:
    name: MCP Server Type Check (Issue #43 — known OOM)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # This job does NOT block merge. It exists to track
    # when the OOM is resolved. See Issue #43.
    continue-on-error: true

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: MCP Server - Install
        run: |
          cd packages/mcp-server
          npm ci

      - name: "MCP Server - tsc --noEmit (Known OOM #43)"
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          cd packages/mcp-server
          npx tsc --noEmit
